<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link rel="icon" href="resources/favicon.ico" type="image/x-icon" sizes="96x96" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="./dist/main.css">
  <script src="index.js" defer></script>
  <title>Device Shop Checkout | devChallenges.io</title>
</head>
<body>
  <div class="backdrop">
  </div>
  <main>
    <div class="title">
      <h1 class="title__header">Checkout</h1>
      <span class="title__count">3 ITEMS</span>
    </div>
    <div class="payment-container">
      <section class="payment-section">
        <div class="cart-container">
          <div class="items-container">

            <div class="item">
              <div class="item__image">
                <img src="./resources/Gold@2x.png">
              </div>
              <div class="item__details">
                <div class="item__header-container">
                  <div class="item__header">
                    <p class="item__name">iPhone 12 Pro</p>
                    <p class="item__cost">$999.00</p>
                  </div>
                  <p class="item__description">Golden</p>
                </div>
                <div class="item__count">
                  <p class="count">x 1</p>
                  <img class="close" src="./resources/close-icon.svg">
                </div>
              </div>
            </div>
            <div class="item">
              <div class="item__image">
                <img src="./resources/Apple-watch@2x.png">
              </div>
              <div class="item__details">
                <div class="item__header-container">
                  <div class="item__header">
                    <p class="item__name">Apple Watch</p>
                    <p class="item__cost">$399.00</p>
                  </div>
                  <p class="item__description">Blue</p>
                </div>
                <div class="item__count">
                  <p class="count">x 1</p>
                  <img class="close" src="./resources/close-icon.svg">
                </div>
              </div>
            </div>
            <div class="item">
              <div class="item__image">
                <img src="./resources/iMac@2x.png">
              </div>
              <div class="item__details">
                <div class="item__header-container">
                  <div class="item__header">
                    <p class="item__name">iMac</p>
                    <p class="item__cost">$1199.00</p>
                  </div>
                  <p class="item__description">Green</p>
                </div>
                <div class="item__count">
                  <p class="count">x 1</p>
                  <img class="close" src="./resources/close-icon.svg">
                </div>
              </div>
            </div>
          </div>
          <hr class="divider">
          <form class="coupon">
            <input type="text" name="coupon" placeholder="Enter coupon code">
            <button class="button" type="submit">Apply Coupon</button>
          </form>
          <ul class="cost__list">
            <li class="cost__item">
              <p class="cost__title">Subtotal</p>
              <p class="cost__value">$2597.00</p>
            </li>
            <li class="cost__item">
              <p class="cost__title">Tax</p>
              <p class="cost__value">$623.28</p>
            </li>
            <li class="cost__item">
              <p class="cost__title cost__bold">Total</p>
              <p class="cost__value cost__bold">$3220.28</p>
            </li>
          </ul>
        </div>
        <div class="contact-form__container">
          <p class="contact-form__header">Contact Information</p>

          <form class="contact-form">

            <div class="contact-form__elem name">
              <label for="name">First & Last name</label>
              <input id="name" name="name" type="text" placeholder="Enter first & last name" autocomplete="name" required>
            </div>

            <div class="contact-form__elem email">
              <label for="email">Email Address</label>
              <input id="email" name="email" type="email" placeholder="Enter email address" autocomplete="email" required>
            </div>

            <div class="contact-form__elem country">
              <label for="country">Country</label>
              <select id="country" name="country" autocomplete="country" required>
                <option value="Finland">Finland</option>
                <option value="Nigeria">Nigeria</option>
                <option value="USA">USA</option>
              </select>
            </div>

            <div class="contact-form__elem postalcode">
              <label for="postalcode">Postal Code</label>
              <input id="postalcode" name="postalcode" type="text" placeholder="00270" autocomplete="postal-code">
            </div>

            <div class="contact-form__elem submit">
              <button class="button" type="submit">Continue</button>
            </div>

          </form>

        </div>
      </section>
    </div>
  </main>
</body>

</html>
